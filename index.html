<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XOLERIC X-CLASS QUANTUM PRO</title>
<style>
:root {
--neon-cyan: #0ff;
--neon-purple: #b0f;
--neon-red: #f04;
--glass-bg: rgba(20, 20, 20, 0.4);
--glass-border: rgba(255, 255, 255, 0.1);
}
 * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
   body {
   background-color: #000;
   color: #fff;
   font-family: 'Courier New', Courier, monospace;
   overflow: hidden;
   width: 100vw;
   height: 100vh;
   touch-action: none;
   }
   #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
   #laser-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; }
   .screen {
   position: absolute; top: 0; left: 0; width: 100%; height: 100%;
   display: flex; flex-direction: column; justify-content: center; align-items: center;
   z-index: 20; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
   background: var(--glass-bg); transition: opacity 0.5s ease;
   }
   .hidden { opacity: 0; pointer-events: none; z-index: -1 !important; }
   .glass-panel {
   background: rgba(0, 0, 0, 0.6); border: 1px solid var(--glass-border);
   box-shadow: 0 0 20px rgba(0, 255, 255, 0.1), inset 0 0 15px rgba(255, 255, 255, 0.05);
   border-radius: 16px; padding: 2rem; text-align: center;
   }
   h1, h2 { text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 10px var(--neon-cyan); margin-bottom: 1rem; }
   input[type="text"], input[type="number"] {
   background: rgba(0,0,0,0.8); border: 1px solid var(--neon-cyan); color: #0ff;
   padding: 10px 15px; font-size: 1.2rem; border-radius: 8px; outline: none;
   text-align: center; text-transform: uppercase; width: 100%; max-width: 300px;
   box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); transition: all 0.3s; margin-bottom: 1.5rem;
   }
   input:focus { box-shadow: 0 0 20px var(--neon-cyan); }
   button {
   background: linear-gradient(45deg, transparent, rgba(0, 255, 255, 0.1), transparent);
   border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
   padding: 12px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 8px;
   text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s;
   box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
   }
   button:hover, button:active { background: var(--neon-cyan); color: #000; box-shadow: 0 0 30px var(--neon-cyan); }
   button.danger { border-color: var(--neon-red); color: var(--neon-red); box-shadow: 0 0 10px rgba(255, 0, 68, 0.2); }
   button.danger:hover, button.danger:active { background: var(--neon-red); color: #000; box-shadow: 0 0 30px var(--neon-red); }
/* GAME UI */
#game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; }
#top-area { flex: 1; min-height: 50px; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; }
#grid-container { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; flex: 6; }
#grid { position: relative; }
.tile {
position: absolute; display: flex; justify-content: center; align-items: center;
background: rgba(25, 25, 30, 0.8); border: 1px solid rgba(0, 255, 255, 0.3);
border-radius: 12px; font-size: 28px; cursor: pointer;
box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
transition: transform 0.2s, background 0.2s, opacity 0.3s, box-shadow 0.2s;
backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
}
.tile.selected {
background: rgba(0, 255, 255, 0.2); border-color: var(--neon-cyan);
box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 15px var(--neon-cyan); transform: scale(1.1); z-index: 2;
}
.tile.matched { opacity: 0; transform: scale(0); pointer-events: none; }
.tile.hinted { animation: pulseHint 1s infinite alternate; }
/* BOTTOM DOCK */
#bottom-dock {
position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
width: 95%; max-width: 800px; padding: 15px; border-radius: 20px;
background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.15);
backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
display: flex; flex-direction: column; gap: 10px; z-index: 20;
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
}
.stats-row { display: flex; justify-content: space-around; font-size: 0.9rem; color: #aaa; text-transform: uppercase; }
.stats-row span { display: flex; flex-direction: column; align-items: center; }
.stat-val { font-size: 1.4rem; color: #fff; text-shadow: 0 0 5px var(--neon-cyan); font-weight: bold; margin-top: 5px; }
.stat-val.error-val { color: var(--neon-red); text-shadow: 0 0 5px var(--neon-red); }
.controls-row { display: flex; justify-content: center; gap: 15px; }
.ctrl-btn {
background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
color: #fff; padding: 10px; border-radius: 50%; width: 50px; height: 50px;
display: flex; justify-content: center; align-items: center; font-size: 1.2rem;
transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}
.ctrl-btn:active { transform: scale(0.9); background: rgba(0,255,255,0.2); border-color: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); }
/* FLOATING SCORE */
.float-score {
position: fixed; color: var(--neon-cyan); font-weight: bold; font-size: 24px;
pointer-events: none; z-index: 30; text-shadow: 0 0 10px var(--neon-cyan);
animation: floatUp 1s ease-out forwards;
}
/* ANIMATIONS */
@keyframes pulseHint { 0% { box-shadow: 0 0 5px var(--neon-purple); border-color: var(--neon-purple); } 100% { box-shadow: 0 0 25px var(--neon-purple); border-color: #fff; transform: scale(1.05); } }
@keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
@keyframes scanline { 0% { top: -10%; } 100% { top: 110%; } }
.cyber-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 10%; background: linear-gradient(to bottom, transparent, rgba(0,255,255,0.1), transparent); animation: scanline 4s linear infinite; pointer-events: none; z-index: 50; opacity: 0.3; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="laser-canvas"></canvas>
<div class="cyber-overlay"></div>
<div id="screen-boot" class="screen">
<div class="glass-panel">
<h1>XOLERIC X-CLASS</h1>
<h3 style="color: var(--neon-purple); letter-spacing: 2px;">QUANTUM PRO TIZIMI</h3>
<p style="margin-top: 20px; color: #555;">TIZIM YUKLANMOQDA...</p>
<div style="width: 100%; height: 2px; background: #111; margin-top: 10px; position: relative; overflow: hidden;">
<div id="boot-bar" style="position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); transition: left 1.5s ease-in-out;"></div>
</div>
</div>
</div>
<div id="screen-login" class="screen hidden">
<div class="glass-panel">
<h2>IDENTIFIKATSIYA</h2>
<input type="text" id="player-name-input" placeholder="O'YINCHI ISMI" maxlength="15" autocomplete="off">


<button id="btn-start">BOSHLASH</button>
</div>
</div>
<div id="game-ui" class="hidden">
<div id="top-area">
<div id="combo-display" style="font-size: 24px; color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); opacity: 0; transition: opacity 0.3s; font-weight: bold;">KOMBO x1</div>
</div>
<div id="grid-container">
<div id="grid"></div>
</div>
</div>
<div id="bottom-dock" class="hidden">
<div class="stats-row">
<span>ISIM<div id="stat-name" class="stat-val">GUEST</div></span>
<span>DARAJA<div id="stat-level" class="stat-val">1</div></span>
<span>HISOB<div id="stat-score" class="stat-val">0</div></span>
<span>XATO<div id="stat-errors" class="stat-val error-val">0/3</div></span>
</div>
<div class="controls-row">

<div class="glass-panel" style="border-color: var(--neon-red); box-shadow: 0 0 30px rgba(255,0,68,0.3);">
<h1 style="color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red);">TIZIM QULFLANGAN</h1>
<p style="margin-bottom: 20px;">Xavfsizlik chegarasi buzildi. Qulfdan chiqarish uchun hisoblang:</p>

</div>
</div>

<h2>O'YIN TUGADI</h2>
<p style="margin-bottom: 10px; font-size: 1.2rem;">Sizning hisobingiz</p>
<h1 id="final-score" style="font-size: 3rem; color: var(--neon-cyan);">0</h1>
<p style="margin-bottom: 30px; color: #aaa;">Yetib borilgan daraja: <span id="final-level" style="color:#fff;">1</span></p>
<button id="btn-restart">YANGIDAN BOSHLASH</button>
</div>
</div>
<script>
// --- PWA INJECTION ---
(function initPWA() {
const manifestData = {
name: "XOLERIC X-CLASS",
short_name: "XOLERIC",
start_url: ".",
display: "fullscreen",
background_color: "#000000",
theme_color: "#00ffff",
icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMDAwIi8+PGNpcmNsZSBjeD0iMjU2IiBjeT0iMjU2IiByPSIxNTAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzBZmYiIHN0cm9rZS13aWR0aD0iMjAiLz48L3N2Zz4=", sizes: "512x512", type: "image/svg+xml" }]
};
const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/json' });
const manifestURL = URL.createObjectURL(manifestBlob);
const link = document.createElement('link');
link.rel = 'manifest'; link.href = manifestURL;
document.head.appendChild(link);
const swCode = const CACHE_NAME = &#39;xoleric-v1&#39;; self.addEventListener(&#39;install&#39;, e =&gt; self.skipWaiting()); self.addEventListener(&#39;activate&#39;, e =&gt; self.clients.claim()); self.addEventListener(&#39;fetch&#39;, e =&gt; { e.respondWith(fetch(e.request).catch(() =&gt; new Response(&#39;Offline - Xoleric Pro&#39;, {headers: {&#39;Content-Type&#39;: &#39;text/html&#39;}}))); });;
const swBlob = new Blob([swCode], { type: 'application/javascript' });
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW Reg Fail:', err));
}
})();
// --- ENGINE VARIABLES ---
const EMOJIS = ['⚛️','🧬','🌌','💠','🌐','🌀','💎','🧿','🧊','🛰️','🕹️','🔋','🔌','📡','🛸','🌠','🎇','🔮','🛡️','⚙️'];
const MAX_ERRORS = 3;
const TILE_SIZE = window.innerWidth < 600 ? 45 : 60;
const TILE_GAP = window.innerWidth < 600 ? 4 : 8;
let state = {
name: '', level: 1, score: 0, combo: 1, errors: 0,
grid: [], rows: 0, cols: 0,
selected: null, hinting: false, lockAnswer: 0
};
let uiEls = {};
let gridEl;
let ctxBg, ctxLaser;
let canvasBg, canvasLaser;
let particles = [];
let animFrame;
// --- INITIALIZATION ---
window.onload = () => {
initDOM();
initCanvas();
loadData();
setTimeout(() => {
document.getElementById('boot-bar').style.left = '0%';
setTimeout(() => {
switchScreen('screen-login');
if (state.name) uiEls.nameInput.value = state.name;
}, 1600);
}, 500);
};
function initDOM() {
uiEls = {
boot: document.getElementById('screen-boot'),
login: document.getElementById('screen-login'),
gameover: document.getElementById('screen-gameover'),
lockdown: document.getElementById('screen-lockdown'),
gameUi: document.getElementById('game-ui'),
dock: document.getElementById('bottom-dock'),
nameInput: document.getElementById('player-name-input'),
statName: document.getElementById('stat-name'),
statLevel: document.getElementById('stat-level'),
statScore: document.getElementById('stat-score'),
statErrors: document.getElementById('stat-errors'),
comboDisplay: document.getElementById('combo-display'),
mathQ: document.getElementById('math-question'),
mathA: document.getElementById('math-answer'),
finalScore: document.getElementById('final-score'),
finalLevel: document.getElementById('final-level')
};
gridEl = document.getElementById('grid');
document.getElementById('btn-start').onclick = startGame;
document.getElementById('btn-shuffle').onclick = shuffleGrid;
document.getElementById('btn-hint').onclick = showHint;
document.getElementById('btn-exit').onclick = gameOver;
document.getElementById('btn-unlock').onclick = unlockSystem;
document.getElementById('btn-restart').onclick = resetGame;
window.addEventListener('resize', resizeCanvas);
}
function initCanvas() {
canvasBg = document.getElementById('bg-canvas');
canvasLaser = document.getElementById('laser-canvas');
ctxBg = canvasBg.getContext('2d', { alpha: false });
ctxLaser = canvasLaser.getContext('2d');
resizeCanvas();
for(let i=0; i<100; i++) particles.push(createParticle());
requestAnimationFrame(loop);
}
function resizeCanvas() {
canvasBg.width = canvasLaser.width = window.innerWidth;
canvasBg.height = canvasLaser.height = window.innerHeight;
}
function createParticle() {
return {
x: Math.random() * window.innerWidth,
y: Math.random() * window.innerHeight,
r: Math.random() * 2 + 0.5,
vx: (Math.random() - 0.5) * 0.5,
vy: (Math.random() - 0.5) * 0.5,
c: Math.random() > 0.5 ? '#0ff' : '#b0f',
a: Math.random() * 0.5 + 0.1
};
}
function loop() {
ctxBg.fillStyle = '#000';
ctxBg.fillRect(0, 0, canvasBg.width, canvasBg.height);
particles.forEach(p => {
p.x += p.vx; p.y += p.vy;
if (p.x < 0 || p.x > canvasBg.width) p.vx *= -1;
if (p.y < 0 || p.y > canvasBg.height) p.vy *= -1;
ctxBg.beginPath();
ctxBg.arc(p.x, p.y, p.r, 0, Math.PI * 2);
ctxBg.fillStyle = p.c;
ctxBg.globalAlpha = p.a;
ctxBg.fill();
});
ctxBg.globalAlpha = 1;
ctxLaser.clearRect(0, 0, canvasLaser.width, canvasLaser.height);
animFrame = requestAnimationFrame(loop);
}
// --- DATA MANAGEMENT ---
function saveData() {
localStorage.setItem('xoleric_save', JSON.stringify(state));
}
function loadData() {
try {
const saved = localStorage.getItem('xoleric_save');
if (saved) state = { ...state, ...JSON.parse(saved) };
} catch(e) {}
}
// --- CORE GAME FLOW ---
function switchScreen(id) {
['screen-boot', 'screen-login', 'screen-gameover', 'screen-lockdown'].forEach(sid => {
document.getElementById(sid).classList.add('hidden');
});
if (id) document.getElementById(id).classList.remove('hidden');
}
function startGame() {
const n = uiEls.nameInput.value.trim();
if(!n) return;
state.name = n;
// Try Fullscreen
if(document.documentElement.requestFullscreen) {
document.documentElement.requestFullscreen().catch(()=>{});
}
switchScreen(null);
uiEls.gameUi.classList.remove('hidden');
uiEls.dock.classList.remove('hidden');
if (state.grid.length === 0 || countRemaining() === 0) {
state.score = 0; state.level = 1; state.errors = 0; state.combo = 1;
buildLevel();
} else {
updateUI();
renderGrid();
}
}
function buildLevel() {
let r = 4 + Math.floor((state.level - 1) / 2) * 2;
let c = 4 + Math.floor(state.level / 2) * 2;
if(r > 10) r = 10; if(c > 12) c = 12;
state.rows = r; state.cols = c;
let totalTiles = r * c;
let pairs = totalTiles / 2;
let emojiPool = [];
for(let i=0; i<pairs; i++) {
let em = EMOJIS[i % EMOJIS.length];
emojiPool.push(em, em);
}
emojiPool.sort(() => Math.random() - 0.5);
state.grid = [];
for(let i=0; i<r; i++) {
let row = [];
for(let j=0; j<c; j++) {
row.push({ id: t_${i}_${j}, emoji: emojiPool.pop(), r: i, c: j, active: true });
}
state.grid.push(row);
}
state.selected = null;
saveData();
updateUI();
renderGrid();
}
function renderGrid() {
gridEl.innerHTML = '';
let gw = state.cols * (TILE_SIZE + TILE_GAP) - TILE_GAP;
let gh = state.rows * (TILE_SIZE + TILE_GAP) - TILE_GAP;
gridEl.style.width = gw + 'px';
gridEl.style.height = gh + 'px';
for(let r=0; r<state.rows; r++){
for(let c=0; c<state.cols; c++){
let tileData = state.grid[r][c];
if(!tileData.active) continue;
  let el = document.createElement(&#39;div&#39;);
  el.className = &#39;tile&#39;;
  el.id = tileData.id;
  el.innerHTML = tileData.emoji;
  el.style.width = TILE_SIZE + &#39;px&#39;;
  el.style.height = TILE_SIZE + &#39;px&#39;;
  el.style.left = c * (TILE_SIZE + TILE_GAP) + &#39;px&#39;;
  el.style.top = r * (TILE_SIZE + TILE_GAP) + &#39;px&#39;;
  
  el.onclick = () =&gt; handleTileClick(tileData, el);
  gridEl.appendChild(el);
}

}
}
function updateUI() {
uiEls.statName.innerText = state.name;
uiEls.statLevel.innerText = state.level;
uiEls.statScore.innerText = state.score;
uiEls.statErrors.innerText = ${state.errors}/${MAX_ERRORS};
if(state.combo > 1) {
uiEls.comboDisplay.innerText = KOMBO x${state.combo};
uiEls.comboDisplay.style.opacity = 1;
} else {
uiEls.comboDisplay.style.opacity = 0;
}
}
// --- LOGIC: MATCHING & PATHFINDING ---
function handleTileClick(data, el) {
if (document.querySelectorAll('.hinted').length) clearHints();
if(!state.selected) {
state.selected = data;
el.classList.add('selected');
return;
}
if(state.selected.id === data.id) {
el.classList.remove('selected');
state.selected = null;
return;
}
let el1 = document.getElementById(state.selected.id);
let el2 = el;
if(state.selected.emoji === data.emoji) {
let path = findPath(state.selected, data);
if(path) {
drawLaser(path);
matchSuccess(state.selected, data, el1, el2);
return;
}
}
// Failed Match
el1.classList.remove('selected');
state.selected = null;
matchFail();
}
function matchSuccess(t1, t2, el1, el2) {
state.grid[t1.r][t1.c].active = false;
state.grid[t2.r][t2.c].active = false;
setTimeout(() => {
el1.classList.add('matched');
el2.classList.add('matched');
}, 100);
let pts = 10 * state.combo;
state.score += pts;
state.combo++;
showFloatingScore(pts, el2);
updateUI();
saveData();
state.selected = null;
setTimeout(() => {
if(countRemaining() === 0) {
state.level++;
state.combo = 1;
buildLevel();
} else {
checkDeadlock();
}
}, 500);
}
function matchFail() {
state.errors++;
state.combo = 1;
updateUI();
uiEls.statErrors.style.animation = 'pulseHint 0.5s';
setTimeout(() => uiEls.statErrors.style.animation = '', 500);
if(state.errors >= MAX_ERRORS) {
triggerLockdown();
}
saveData();
}
// --- PATHFINDING (BFS Onet Algo) ---
function findPath(start, end) {
let rows = state.rows + 2; let cols = state.cols + 2;
let virtualGrid = Array(rows).fill(0).map(() => Array(cols).fill(0));
for(let r=0; r<state.rows; r++){
for(let c=0; c<state.cols; c++){
virtualGrid[r+1][c+1] = state.grid[r][c].active ? 1 : 0;
}
}
let sr = start.r + 1, sc = start.c + 1;
let er = end.r + 1, ec = end.c + 1;
virtualGrid[sr][sc] = 0; virtualGrid[er][ec] = 0; // Temporarily walk-able
let q = [];
let dist = Array(rows).fill(0).map(()=>Array(cols).fill(0).map(()=>Array(4).fill(99)));
for(let d=0; d<4; d++){
q.push({ r: sr, c: sc, dir: d, turns: 0, path: [{r: sr, c: sc}] });
dist[sr][sc][d] = 0;
}
let dr = [-1, 0, 1, 0]; let dc = [0, 1, 0, -1];
let bestPath = null;
while(q.length > 0) {
let curr = q.shift();
if(curr.turns > 2) continue;
if(curr.r === er && curr.c === ec) {
if(!bestPath || curr.turns < bestPath.turns) bestPath = curr.path;
continue;
}
for(let d=0; d&lt;4; d++){
  let nr = curr.r + dr[d], nc = curr.c + dc[d];
  if(nr&lt;0 || nr&gt;=rows || nc&lt;0 || nc&gt;=cols) continue;
  if(virtualGrid[nr][nc] === 1) continue;
  
  let nturns = curr.turns + (curr.dir === d ? 0 : 1);
  if(nturns &gt; 2) continue;
  
  if(nturns &lt;= dist[nr][nc][d]) { // Allow equal turns to explore alternative better paths
    dist[nr][nc][d] = nturns;
    q.push({ r: nr, c: nc, dir: d, turns: nturns, path: [...curr.path, {r:nr, c:nc}] });
  }
}

}
return bestPath;
}
// --- VISUAL EFFECTS ---
function drawLaser(path) {
if(!path || path.length < 2) return;
const rect = gridEl.getBoundingClientRect();
const ox = rect.left; const oy = rect.top;
let pts = path.map(p => {
return {
x: ox + (p.c - 1) * (TILE_SIZE + TILE_GAP) + TILE_SIZE/2,
y: oy + (p.r - 1) * (TILE_SIZE + TILE_GAP) + TILE_SIZE/2
};
});
let frame = 0;
function animateLine() {
ctxLaser.clearRect(0, 0, canvasLaser.width, canvasLaser.height);
ctxLaser.beginPath();
ctxLaser.moveTo(pts[0].x, pts[0].y);
for(let i=1; i<pts.length; i++) ctxLaser.lineTo(pts[i].x, pts[i].y);
ctxLaser.strokeStyle = `rgba(0, 255, 255, ${1 - frame/20})`;
ctxLaser.lineWidth = 4;
ctxLaser.lineCap = &#39;round&#39;;
ctxLaser.lineJoin = &#39;round&#39;;
ctxLaser.shadowColor = &#39;#0ff&#39;;
ctxLaser.shadowBlur = 15;
ctxLaser.stroke();

frame++;
if(frame &lt; 20) requestAnimationFrame(animateLine);
else ctxLaser.clearRect(0, 0, canvasLaser.width, canvasLaser.height);

}
animateLine();
}
function showFloatingScore(pts, el) {
let rect = el.getBoundingClientRect();
let f = document.createElement('div');
f.className = 'float-score';
f.innerText = '+' + pts;
f.style.left = rect.left + 'px';
f.style.top = rect.top + 'px';
document.body.appendChild(f);
setTimeout(() => f.remove(), 1000);
}
// --- UTILITIES ---
function countRemaining() {
let count = 0;
for(let r=0; r<state.rows; r++) for(let c=0; c<state.cols; c++) if(state.grid[r][c].active) count++;
return count;
}
function getAllActive() {
let active = [];
for(let r=0; r<state.rows; r++) for(let c=0; c<state.cols; c++) {
if(state.grid[r][c].active) active.push(state.grid[r][c]);
}
return active;
}
function findValidPair() {
let active = getAllActive();
for(let i=0; i<active.length; i++){
for(let j=i+1; j<active.length; j++){
if(active[i].emoji === active[j].emoji) {
if(findPath(active[i], active[j])) return [active[i], active[j]];
}
}
}
return null;
}
function checkDeadlock() {
if(countRemaining() > 0 && !findValidPair()) {
shuffleGrid(true); // Auto shuffle if deadlocked
}
}
function shuffleGrid(auto = false) {
let active = getAllActive();
let emojis = active.map(t => t.emoji);
emojis.sort(() => Math.random() - 0.5);
let i = 0;
for(let r=0; r<state.rows; r++) {
for(let c=0; c<state.cols; c++) {
if(state.grid[r][c].active) {
state.grid[r][c].emoji = emojis[i++];
}
}
}
state.selected = null;
renderGrid();
if(!auto) { state.score = Math.max(0, state.score - 50); updateUI(); }
// Ensure we didn't shuffle into another deadlock
if(!findValidPair() && countRemaining() > 0) shuffleGrid(true);
}
function showHint() {
clearHints();
let pair = findValidPair();
if(pair) {
document.getElementById(pair[0].id).classList.add('hinted');
document.getElementById(pair[1].id).classList.add('hinted');
state.score = Math.max(0, state.score - 20);
updateUI();
}
}
function clearHints() {
document.querySelectorAll('.hinted').forEach(el => el.classList.remove('hinted'));
}
// --- LOCKDOWN SYSTEM ---
function triggerLockdown() {
uiEls.gameUi.classList.add('hidden');
uiEls.dock.classList.add('hidden');
switchScreen('screen-lockdown');
let a = Math.floor(Math.random() * 10) + 5;
let b = Math.floor(Math.random() * 10) + 5;
state.lockAnswer = a * b;
uiEls.mathQ.innerText = ${a} × ${b} = ?;
uiEls.mathA.value = '';
}
function unlockSystem() {
if(parseInt(uiEls.mathA.value) === state.lockAnswer) {
state.errors = 0;
saveData();
switchScreen(null);
uiEls.gameUi.classList.remove('hidden');
uiEls.dock.classList.remove('hidden');
updateUI();
} else {
gameOver();
}
}
// --- GAME OVER ---
function gameOver() {
uiEls.gameUi.classList.add('hidden');
uiEls.dock.classList.add('hidden');
switchScreen('screen-gameover');
uiEls.finalScore.innerText = state.score;
uiEls.finalLevel.innerText = state.level;
// Wipe save
state.grid = []; state.score = 0; state.level = 1; state.errors = 0; state.combo = 1;
saveData();
}
function resetGame() {
switchScreen('screen-login');
}
</script>
